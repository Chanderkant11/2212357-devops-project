name: CD - Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Environment
        run: |
          echo "Simulating production deployment to EC2 instance..."
          docker build -t fastapi-app .
          echo "Deployment steps successfully verified."
