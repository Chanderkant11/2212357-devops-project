name: CD - Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH & redeploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Update and install Docker using yum (for Amazon Linux)
            sudo yum update -y
            if ! command -v docker &> /dev/null; then
              sudo yum install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ec2-user
            fi
            
            # 2. Setup standard standalone Docker Compose
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            sudo ln -sf /usr/local/bin/docker-compose /usr/bin/docker-compose

            # 3. Synchronize application folder
            mkdir -p ~/app
            cd ~/app
            if [ ! -d ".git" ]; then
              git clone https://github.com/Chanderkant11/2212357-devops-project.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi
            
            # 4. Stop existing containers and launch the production environment file
            sudo /usr/local/bin/docker-compose -f docker-compose.prod.yml down || true
            sudo /usr/local/bin/docker-compose -f docker-compose.prod.yml up -d --build
            
